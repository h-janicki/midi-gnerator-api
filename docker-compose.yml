services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: dev
    volumes:
      - ./backend/app:/app/app
      - ./settings.toml:/app/settings.toml
      - ./.secrets.toml:/app/.secrets.toml
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
